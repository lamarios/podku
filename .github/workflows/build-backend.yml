name: build-backend.yml
# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
    tags:
      - '*'
    paths-ignore:
      - '**/README.md'
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Web and backend
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:dind
        options: --privileged --shm-size=2g
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock:ro
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract tag name
        id: extract_tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - name: Set build number
        id: set_build_number
        if: ${{ ! startsWith(github.ref, 'refs/tags/') }}
        run: echo "TAG_NAME=1" >> $GITHUB_ENV
      # Build web app
      - name: build web
        working-directory: ./podku_flutter
        run: |
          nix-shell --run "flutter build web --release --build-number ${{ env.TAG_NAME }} -o ../podku_server/web" ../shell.nix
      # build backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          file: ./podku_server/Dockerfile

          tags: ${{ secrets.DOCKER_USERNAME }}/podku:${{ github.sha }}

      - name: Build and push Docker image (Release)
        uses: docker/build-push-action@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          file: ./podku_server/Dockerfile
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/podku:latest
            ${{ secrets.DOCKER_USERNAME }}/podku:${{ env.TAG_NAME }}
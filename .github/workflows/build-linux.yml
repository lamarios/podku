# This is a basic workflow to help you get started with Actions
name: Build linux app

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
    paths-ignore:
      - '**/README.md'
    tags:
      - '*'
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    name: Build and release linux app
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    #env:
    #  JAVA_VERSION: "11.0"
    #  FLUTTER_VERSION: "2.5.3"
    steps:
      - uses: actions/checkout@v4
      #      - name: Set up JDK 21
      #        uses: actions/setup-java@v4
      #        with:
      #          java-version: '21'
      #          distribution: 'adopt'
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Extract tag name
        id: extract_tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
      - run: set -e
#      - name: Run tests
#        working-directory: podku_flutter
#        run: |
#          nix-shell --run "flutter test"
      - name: Build app
        working-directory: podku_flutter
        run: |
          nix-shell --run "../submodules/flutter/bin/flutter build linux --release" ../shell.nix
#      - name: Set up Ruby
#        if: startsWith(github.ref, 'refs/tags/')
#        uses: ruby/setup-ruby@v1
#        with:
#          ruby-version: '3.0'
#          working-directory: podku_flutter/android
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: podku_flutter/build/app/outputs/flutter-apk
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appbundle
          path: podku_flutter/build/linux/x64/release/bundle
    #  - name: Upload binaries to release
    #    uses: svenstaro/upload-release-action@v2
    #    if: startsWith(github.ref, 'refs/tags/')
    #    with:
    #      repo_token: ${{ secrets.GH_TOKEN }}
    #      file: podku_flutter/build/linux/x64/release/bundle
    #      tag: ${{ github.ref }}
    #      overwrite: true
    #      file_glob: true
     # - name: Install dependencies
     #   if: startsWith(github.ref, 'refs/tags/')
     #   working-directory: podku_flutter/android
     #   run: |
     #     bundle install

      - name: Run Fastlane to release
        working-directory: podku_flutter/android
        if: startsWith(github.ref, 'refs/tags/')
        run: nix-shell --run "fastlane deploy" ../../shell.nix
